spring.application.name=AuthService

# --- Database (local MySQL) ---
spring.datasource.url=${USER_DB_HOST}
spring.datasource.username=${USER_DB_USERNAME}
spring.datasource.password=${USER_DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Kafka ---
# Spring Kafka (spring-kafka) configuration
# Mapped from existing Kafka keys above so spring-kafka/spring-boot can auto-configure clients
# Uses placeholders to reuse the values already defined in this file (bootstrap.servers, sasl.jaas.config, etc.)
spring.kafka.bootstrap-servers=${KAFKA_SERVER}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=auth-service-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.chronos.UserService.entity
spring.kafka.properties.security.protocol=SASL_SSL
spring.kafka.properties.sasl.mechanism=PLAIN
spring.kafka.properties.sasl.jaas.config=${KAFKA_JAAS_CONFIG}
spring.kafka.properties.session.timeout.ms=${session.timeout.ms:45000}

# Producer-specific settings
spring.kafka.producer.acks=all
spring.kafka.producer.client-id=${KAFKA_PRODUCER_CLIENT}

# Shared Kafka client properties (security, SASL, DNS lookup, timeouts)
spring.kafka.properties.client.dns.lookup=use_all_dns_ips

# --- JWT ---
# Must be at least 32 bytes for HS256
jwt.secret=${JWT_SECRET_KEY}
jwt.expiration-ms=${JWT_EXPIRY_TIME:3600000}

# Gateway port
server.port=${APP_PORT:8080}

# User Service
spring.cloud.gateway.server.webmvc.routes[0].id=user-service
spring.cloud.gateway.server.webmvc.routes[0].uri=${USER_SERVICE_API:http://localhost:8081}
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/users/**

# Job Service
spring.cloud.gateway.server.webmvc.routes[1].id=job-service
spring.cloud.gateway.server.webmvc.routes[1].uri=${JOB_SERVICE_API:http://localhost:9091}
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/jobs/**