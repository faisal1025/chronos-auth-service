name: deploy gradle application with docker compose

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: pull to vm
        uses: actions/checkout@v6

      - name: create docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/auth-service-api:${{ github.sha }} -t ${{ secrets.DOCKER_USERNAME }}/auth-service-api:latest .

      - name: docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: docker hub push
        run: docker push ${{ secrets.DOCKER_USERNAME }}/auth-service-api:${{ github.sha }} && docker push ${{ secrets.DOCKER_USERNAME }}/auth-service-api:latest

  deploy:
    needs: [build]

    runs-on: ubuntu-latest

    steps:
      - name: ssh and deploy
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: | 
            docker pull ${{ secrets.DOCKER_USERNAME }}/auth-service-api:${{ github.sha }}
  
            docker stop app || true
            
            docker rm app || true
            
            docker run -d --restart unless-stopped -p 127.0.0.1:${{ secrets.SERVER_PORT }}:${{ secrets.DOCKER_PORT }} \
            -e APP_PORT=${{ secrets.DOCKER_PORT }} \
            -e DB_URL=${{ secrets.USER_DB_HOST }} \
            -e DB_USERNAME=${{ secrets.USER_DB_USERNAME }} \
            -e DB_PASSWORD=${{ secrets.USER_DB_PASSWORD }} \
            -e SPRING_PROFILES_ACTIVE=prod \
            -e JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }} \
            -e JWT_SECRET_KEY="${{ secrets.JWT_SECRET_KEY }}" \
            -e KAFKA_JAAS_CONFIG="${{ secrets.KAFKA_JAAS_CONFIG }}" \
            -e KAFKA_PRODUCER_CLIENT="${{ secrets.KAFKA_PRODUCER_CLIENT }}" \
            -e KAFKA_SERVER="${{ secrets.KAFKA_SERVER }}" \
            -e JOB_SERVICE_API="${{ secrets.JOB_SERVICE_API }}" \
            -e USER_SERVICE_API="${{ secrets.USER_SERVICE_API }}" \
            --name app ${{ secrets.DOCKER_USERNAME }}/auth-service-api:${{ github.sha }}
